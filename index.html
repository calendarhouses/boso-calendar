<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSO Booking & Доступність</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 20px; text-align: center; background-color: #f9f6f0; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; color: #2d3748; }
        
        .bosman-avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #8f9779; margin-bottom: 12px; object-fit: cover; box-shadow: 0 4px 12px rgba(143, 151, 121, 0.2); }
        h2 { color: #1a202c; font-size: 22px; margin-top: 0; margin-bottom: 6px; font-weight: 700; letter-spacing: -0.3px; }
        p.subtitle { color: #718096; font-size: 14px; margin-top: 0; margin-bottom: 24px; font-weight: 400; }
        
        .step-container { background: white; padding: 24px 20px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); width: 100%; max-width: 360px; margin: 0 auto; display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; box-sizing: border-box; }
        .step-container.active { opacity: 1; transform: translateY(0); }

        button { background-color: #8f9779; color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.25s ease; margin-bottom: 12px; box-sizing: border-box; box-shadow: 0 4px 15px rgba(143, 151, 121, 0.25); letter-spacing: 0.3px; }
        
        .btn-outline { background-color: #f7f9f5; color: #6a755d; border: 1px solid #e2e8e0; box-shadow: none; font-weight: 500; }
        .btn-outline:active { background-color: #edf2e9; transform: scale(0.98); }

        .final-btn { margin-bottom: 12px; } 
        .final-btn:last-child { margin-bottom: 0; }

        @keyframes pulse-premium {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(143, 151, 121, 0.25); }
            50% { transform: scale(1.02); box-shadow: 0 8px 20px rgba(143, 151, 121, 0.4); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(143, 151, 121, 0.25); }
        }
        .btn-alive { animation: pulse-premium 2.5s infinite ease-in-out; }
        .btn-alive:active { animation: none; transform: scale(0.98); box-shadow: 0 2px 8px rgba(143, 151, 121, 0.2); }

        .select-css { display: block; font-size: 15px; font-family: inherit; font-weight: 500; color: #2d3748; line-height: 1.4; padding: 16px 20px; width: 100%; box-sizing: border-box; margin: 0 auto 20px auto; border: 1px solid #e2e8f0; border-radius: 14px; background-color: #fdfdfd; -moz-appearance: none; -webkit-appearance: none; appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238f9779%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat, repeat; background-position: right 1em top 50%, 0 0; background-size: .8em auto, 100%; outline: none; transition: all 0.2s ease; }
        .select-css:hover, .select-css:focus { border-color: #8f9779; box-shadow: 0 0 0 3px rgba(143, 151, 121, 0.1); }
        #loader { color: #8f9779; font-weight: 500; font-size: 15px; margin-bottom: 20px; }
        
        .flatpickr-calendar { margin: 0 auto; box-shadow: none; border: 1px solid #e2e8f0; border-radius: 14px; padding: 5px; width: 100% !important; max-width: 100% !important; box-sizing: border-box; }
        .flatpickr-days { width: 100% !important; }
        .dayContainer { width: 100% !important; min-width: auto !important; max-width: 100% !important; justify-content: space-around; }

        .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay { visibility: hidden !important; pointer-events: none !important; }
        .flatpickr-day.booked-date { background-color: #fee2e2 !important; color: #991b1b !important; font-weight: 600 !important; opacity: 1 !important; transform: scale(0.9); border-radius: 50% !important; border: none !important; }
        .flatpickr-day:not(.flatpickr-disabled):not(.prevMonthDay):not(.nextMonthDay):not(.selected):not(.startRange):not(.endRange):not(.inRange) { background-color: #dcfce7 !important; color: #166534 !important; font-weight: 600 !important; border: none !important; transform: scale(0.9); border-radius: 50% !important; }
        .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange { background-color: #8f9779 !important; color: white !important; font-weight: 700 !important; border: none !important; border-radius: 50% !important; transform: scale(0.95) !important; box-shadow: none !important; }
        .flatpickr-day.inRange { background-color: #e2e8d8 !important; color: #3f4a30 !important; border: none !important; border-radius: 50% !important; transform: scale(0.9) !important; box-shadow: none !important; }

        .guest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .guest-btn { background-color: #f8fafc; color: #475569; border: 1px solid #e2e8f0; padding: 14px 5px; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.2s; box-shadow: none; }
        .guest-btn:hover { background-color: #8f9779; color: white; border-color: #8f9779; }

        #summary-content { text-align: left; background: #ffffff; padding: 0; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 24px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .summary-header { background-color: #8f9779; color: white; padding: 16px; font-weight: 600; font-size: 16px; text-align: center; letter-spacing: 0.3px; }
        .summary-body { padding: 20px; }
        .summary-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f1f5f9; }
        .summary-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: flex-start; }
        .summary-row:last-child { margin-bottom: 0; }
        
        .summary-label { color: #718096; font-weight: 400; font-size: 14px; display: flex; align-items: center; flex: 1; }
        .summary-icon { font-size: 15px; margin-right: 8px; opacity: 0.8; }
        .summary-value { color: #2d3748; font-weight: 500; font-size: 14.5px; text-align: right; flex: 1.2; line-height: 1.4; letter-spacing: 0.2px; }
        
        .nowrap-date { white-space: nowrap; }
        .summary-value.price { font-size: 15px; }
        .summary-value.total { font-size: 20px; color: #1a202c; font-weight: 700; letter-spacing: -0.5px; }
        .summary-value.discount { color: #e53e3e; font-weight: 500; }
        .summary-value.strikethrough { text-decoration: line-through; color: #a0aec0; font-weight: 400; font-size: 13px; }
        
        .summary-total-box { background-color: #f8fafc; padding: 16px; border-radius: 12px; margin-top: 8px; border: 1px solid #edf2f7; }
        .summary-disclaimer { font-size: 12px; color: #a0aec0; background-color: #fdfdfd; padding: 14px 20px; border-top: 1px solid #f1f5f9; line-height: 1.5; text-align: center; font-weight: 400; }

        #message { margin: 20px auto 0 auto; width: fit-content; max-width: 90%; font-weight: 500; font-size: 15px; display: none; padding: 16px 24px; background: white; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); box-sizing: border-box; color: #4a5568; }
    </style>
</head>
<body>

    <img id="main-img" src="bosman.jpg" alt="Капітан Босман" class="bosman-avatar" onerror="this.src='https://via.placeholder.com/100?text=BOSO'">
    <h2 id="main-title">Бронювання котеджу ⚓</h2>
    <p id="main-subtitle" class="subtitle">🔴 Зайнято | 🟢 Вільно</p>

    <div id="step-1" class="step-container active" style="display: block;">
        <select id="cottageSelect" class="select-css" onchange="loadCalendarDates()">
            <option value="65e8865b5cc7538d464e3f77">JUNIOR 1 (котедж для двох)</option>
            <option value="65e8834e5cc7538d464e3b46">FAMILY №2 (сімейний котедж)</option>
            <option value="65e8863a5cc7538d464e3eab">FAMILY №3 (сімейний котедж)</option>
            <option value="65e886505cc7538d464e3f1d">FAMILY №4 (сімейний котедж)</option>
        </select>
        <div id="loader">⏳ Звіряємо бортові журнали...</div>
        <div id="calendar-wrapper" style="display: none;">
            <input type="text" id="inlineCalendar" style="display:none;">
            <button id="nextBtnStep1" style="display:none; margin-top: 20px;" onclick="goToStep2()">Продовжити бронювання</button>
        </div>
    </div>

    <div id="step-2" class="step-container">
        <div id="guest-buttons" class="guest-grid"></div>
        <button class="btn-outline" onclick="goBack(1)">Назад</button>
    </div>

    <div id="step-3" class="step-container">
        <button onclick="goToStep4('Так')">🐶 Так, ми з хвостиком</button>
        <button class="btn-outline" onclick="goToStep4('Ні')">Ні, без тварин</button>
        <button class="btn-outline" onclick="goBack(2)" style="margin-top: 10px;">Назад</button>
    </div>

    <div id="step-4" class="step-container">
        <button onclick="submitData('Так')">♨️ Так, обов'язково!</button>
        <button class="btn-outline" onclick="submitData('Ні')">Ні, дякую</button>
        <button class="btn-outline" onclick="goBack(3)" style="margin-top: 10px;">Назад</button>
    </div>

    <div id="step-5" class="step-container">
        <div id="summary-content"></div>
        <button class="final-btn btn-alive" onclick="confirmBooking()">✅ Підтвердити та забронювати</button>
        <button class="btn-outline final-btn" onclick="cancelAndRestart()">🔄 Почати спочатку</button>
    </div>

    <div id="message">⚓ Оформлюємо чек...</div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/uk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const urlParams = new URLSearchParams(window.location.search);
        const userId = tg.initDataUnsafe?.user?.id || urlParams.get('user_id');
        const guestName = urlParams.get('guest_name') || tg.initDataUnsafe?.user?.first_name || "Гість";
        const guestPhone = urlParams.get('guest_phone')?.replace(' ', '+') || "Не вказано";

        const bookUrl = "https://script.google.com/macros/s/AKfycbwQNcWFZPXQHNY4VRUUujMIqJsHXA5O-vNmvKICxwQfiJfQH71AZlHQUU74OSFfwEOxrw/exec";

        let fpInstance = null; 
        let finalCheckIn = "", finalCheckOut = "", finalGuests = "", finalPets = "", finalRoomId = "";
        let currentBookingId = null;

        function updateHeader(title, subtitle) {
            document.getElementById('main-title').innerText = title;
            document.getElementById('main-subtitle').innerText = subtitle;
        }

        function showStep(stepNumber) {
            document.querySelectorAll('.step-container').forEach(el => { el.style.display = 'none'; el.classList.remove('active'); });
            setTimeout(() => { 
                let current = document.getElementById('step-' + stepNumber);
                current.style.display = 'block'; 
                setTimeout(() => current.classList.add('active'), 10);
            }, 10);
        }

        // 🔥 ФУНКЦІЯ ДЛЯ ПОКАЗУ ПОМИЛОК 🔥
        function showToastError(text) {
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block';
            msgDiv.style.color = "#e53e3e";
            msgDiv.innerText = "⚠️ " + text;
            setTimeout(() => { msgDiv.style.display = 'none'; }, 3500);
        }

        function loadCalendarDates() {
            finalRoomId = document.getElementById('cottageSelect').value;
            document.getElementById('loader').style.display = 'block';
            document.getElementById('calendar-wrapper').style.display = 'none';
            document.getElementById('nextBtnStep1').style.display = 'none';

            fetch(`${bookUrl}?action=getDates&roomId=${finalRoomId}`)
                .then(response => response.json())
                .then(disabledDatesArray => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('calendar-wrapper').style.display = 'block';

                    const bookedDatesSet = new Set(disabledDatesArray);
                    if (fpInstance) fpInstance.destroy();

                    // 🔥 ОНОВЛЕНА ЛОГІКА КАЛЕНДАРЯ 🔥
                    fpInstance = flatpickr("#inlineCalendar", {
                        inline: true, 
                        mode: "range", 
                        minDate: "today", 
                        locale: "uk", 
                        showMonths: 1, 
                        // Ми прибрали 'disable:', щоб дати були клікабельні, але...
                        
                        // ...візуально малюємо їх червоними
                        onDayCreate: function(dObj, dStr, fp, dayElem) {
                            if (bookedDatesSet.has(fp.formatDate(dayElem.dateObj, "Y-m-d"))) {
                                dayElem.classList.add("booked-date");
                            }
                        },
                        // ...та самостійно блокуємо неправильний вибір
                        onChange: function(selectedDates, dateStr, instance) {
                            document.getElementById('nextBtnStep1').style.display = 'none';

                            if (selectedDates.length === 1) {
                                let checkInStr = instance.formatDate(selectedDates[0], "Y-m-d");
                                // Не даємо обрати зайняту дату як дату ЗАЇЗДУ
                                if (bookedDatesSet.has(checkInStr)) {
                                    instance.clear();
                                    showToastError("Ця дата вже зайнята. Оберіть іншу для заїзду.");
                                }
                            } else if (selectedDates.length === 2) {
                                let start = selectedDates[0];
                                let end = selectedDates[1];
                                let checkInStr = instance.formatDate(start, "Y-m-d");
                                let checkOutStr = instance.formatDate(end, "Y-m-d");

                                // Перевірка на 0 ночей
                                if (checkInStr === checkOutStr) {
                                    instance.clear();
                                    showToastError("Дата заїзду та виїзду збігаються. Оберіть мінімум 1 ніч.");
                                    return;
                                }

                                // Перевірка: чи не захопив гість "зайняті" дні посеред свого бронювання
                                let current = new Date(start);
                                let hasOverlap = false;
                                while (current < end) {
                                    if (bookedDatesSet.has(instance.formatDate(current, "Y-m-d"))) {
                                        hasOverlap = true;
                                        break;
                                    }
                                    current.setDate(current.getDate() + 1);
                                }

                                if (hasOverlap) {
                                    instance.clear();
                                    showToastError("Обрані дати перетинаються з існуючим бронюванням.");
                                } else {
                                    finalCheckIn = checkInStr;
                                    finalCheckOut = checkOutStr;
                                    document.getElementById('nextBtnStep1').style.display = 'block';
                                }
                            }
                        }
                    });
                }).catch(e => {
                    document.getElementById('loader').innerText = "❌ Помилка зв'язку. Спробуйте пізніше.";
                });
        }

        function goToStep2() {
            const maxGuests = (finalRoomId === "65e8865b5cc7538d464e3f77") ? 4 : 6; 
            const guestDiv = document.getElementById("guest-buttons");
            guestDiv.innerHTML = ""; guestDiv.style.gridTemplateColumns = (maxGuests === 4) ? "repeat(2, 1fr)" : "repeat(3, 1fr)";
            for(let i = 1; i <= maxGuests; i++) {
                let btn = document.createElement("button"); btn.className = "guest-btn"; btn.innerText = i + " 👤";
                btn.onclick = function() { finalGuests = i; goToStep3(); }; guestDiv.appendChild(btn);
            }
            updateHeader("Скільки вас буде?", "Оберіть кількість осіб"); showStep(2);
        }

        function goToStep3() { updateHeader("Ви з пухнастиком?", "Ми дружні до тварин"); showStep(3); }

        function goToStep4(petAnswer) {
            finalPets = petAnswer;
            if (finalRoomId === "65e8863a5cc7538d464e3eab" || finalRoomId === "65e886505cc7538d464e3f1d") {
                updateHeader("Бажаєте гарячий чан?", "Ідеально для вечірнього релаксу"); showStep(4);
            } else { submitData("На місці (по ситуації)"); }
        }

        function goBack(stepNumber) {
            if(stepNumber === 1) { updateHeader("Бронювання котеджу ⚓", "🔴 Зайнято | 🟢 Вільно"); document.getElementById('nextBtnStep1').style.display = 'none'; }
            if(stepNumber === 2) updateHeader("Скільки вас буде?", "Оберіть кількість осіб");
            if(stepNumber === 3) updateHeader("Ви з пухнастиком?", "Ми дружні до тварин");
            showStep(stepNumber);
        }

        function formatDatePremium(dateStr) {
            if(!dateStr) return "";
            const parts = dateStr.split('-');
            if(parts.length !== 3) return dateStr;
            return `${parts[2]}.${parts[1]}.${parts[0]}`;
        }

        function submitData(chanAnswer) {
            document.querySelectorAll('.step-container').forEach(el => { el.style.display = 'none'; el.classList.remove('active'); });

            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block'; msgDiv.style.color = "#8f9779";
            msgDiv.innerText = "⚓ Отримуємо точний розрахунок від Капітана..."; 
            updateHeader("Оформлюємо чек", ""); 

            const finalUrl = `${bookUrl}?action=book&userId=${userId}&checkIn=${finalCheckIn}&checkOut=${finalCheckOut}&guests=${finalGuests}&pets=${finalPets}&chan=${chanAnswer}&roomId=${finalRoomId}&guestName=${encodeURIComponent(guestName)}&guestPhone=${encodeURIComponent(guestPhone)}`;

            fetch(finalUrl).then(response => response.json()).then(data => {
                msgDiv.style.display = 'none';
                if (data.error && data.error.includes("Зайнято")) {
                    msgDiv.style.display = 'block'; msgDiv.style.color = "#e53e3e"; msgDiv.innerText = "⚠️ Дати вже зайняті екіпажем! Оберіть інші.";
                    setTimeout(() => { msgDiv.style.display = 'none'; if(fpInstance) fpInstance.clear(); goBack(1); }, 3500);
                } else if (data.error) {
                    msgDiv.style.display = 'block'; msgDiv.style.color = "#e53e3e"; msgDiv.innerText = data.error.replace("Помилка:", "❌");
                    setTimeout(() => { msgDiv.style.display = 'none'; if(fpInstance) fpInstance.clear(); goBack(1); }, 3500);
                } else {
                    currentBookingId = data.bookingId;
                    
                    let cleanRoomName = data.roomName ? data.roomName.replace(/\s*\(.*?\)\s*/g, '').trim() : "Котедж BOSO";
                    let prettyCheckIn = formatDatePremium(data.checkIn);
                    let prettyCheckOut = formatDatePremium(data.checkOut);

                    let extraRows = "";
                    if (data.extraFeeText) {
                        data.extraFeeText.split('\n').forEach(fee => {
                            let cleanFee = fee.replace(/<\/?b>/g, ''); 
                            let parts = cleanFee.split(':');
                            if(parts.length > 1) {
                                let label = parts[0].replace('➕ ', '').replace('🐶 ', '').trim();
                                let value = parts[1].replace('+', '').trim();
                                let icon = fee.includes('🐶') ? '🐶' : '➕';
                                extraRows += `<div class="summary-row"><div class="summary-label"><span class="summary-icon">${icon}</span>${label}</div><div class="summary-value price">${value}</div></div>`;
                            }
                        });
                    }

                    let discountHtml = "";
                    if (data.discount > 0) {
                        discountHtml = `
                        <div class="summary-section">
                            <div class="summary-row"><div class="summary-label">Базова вартість</div><div class="summary-value price strikethrough">${data.basePrice} грн</div></div>
                            <div class="summary-row"><div class="summary-label">Знижка Капітана 🎁</div><div class="summary-value price discount">-${data.discount} грн</div></div>
                        </div>`;
                    }

                    document.getElementById('summary-content').innerHTML = `
                        <div class="summary-header">
                            Деталі бронювання
                        </div>
                        <div class="summary-body">
                            <div class="summary-section">
                                <div class="summary-row"><div class="summary-label"><span class="summary-icon">🏠</span>Котедж</div><div class="summary-value">${cleanRoomName}</div></div>
                                <div class="summary-row"><div class="summary-label"><span class="summary-icon">📅</span>Дати</div><div class="summary-value nowrap-date">${prettyCheckIn} — ${prettyCheckOut}</div></div>
                                <div class="summary-row"><div class="summary-label"><span class="summary-icon">🌙</span>Ночей</div><div class="summary-value">${data.nights}</div></div>
                            </div>
                            <div class="summary-section">
                                <div class="summary-row"><div class="summary-label"><span class="summary-icon">👥</span>Гості</div><div class="summary-value">${data.guests} осіб</div></div>
                                <div class="summary-row"><div class="summary-label"><span class="summary-icon">🐶</span>Тварини</div><div class="summary-value">${data.pets}</div></div>
                                <div class="summary-row"><div class="summary-label"><span class="summary-icon">♨️</span>Чан</div><div class="summary-value">${data.chan}</div></div>
                            </div>
                            ${extraRows ? `<div class="summary-section">${extraRows}</div>` : ''}
                            ${discountHtml}
                            <div class="summary-total-box">
                                <div class="summary-row"><div class="summary-label" style="font-size: 16px; color: #1a202c; font-weight: 600;">Разом:</div><div class="summary-value total">${data.totalPrice} грн</div></div>
                                <div class="summary-row" style="margin-top: 6px;"><div class="summary-label" style="font-size: 13px;">Передоплата (50%)</div><div class="summary-value price" style="color: #4a5568;">${data.prepayment} грн</div></div>
                            </div>
                        </div>
                        <div class="summary-disclaimer">
                            ⏳ <b>Важливо:</b> Дати зарезервовані за вами. Підтвердіть та здійсніть оплату в чаті протягом 30 хвилин.
                        </div>
                    `;
                    updateHeader("Капітан підготував чек 📜", "");
                    showStep(5);
                }
            }).catch(e => {
                msgDiv.style.display = 'block'; msgDiv.style.color = "#e53e3e"; msgDiv.innerText = "❌ Помилка підключення.";
                setTimeout(() => { if (tg) tg.close(); }, 2500);
            });
        }

        function confirmBooking() {
            document.querySelectorAll('.step-container').forEach(el => { el.style.display = 'none'; el.classList.remove('active'); });
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block'; msgDiv.style.color = "#38a169";
            msgDiv.innerText = "✅ Дати успішно зафіксовано! Повертайтеся в чат для оплати.";

            fetch(`${bookUrl}?action=confirm&userId=${userId}`)
                .then(() => { setTimeout(() => { if (tg) tg.close(); }, 2000); })
                .catch(() => { setTimeout(() => { if (tg) tg.close(); }, 2000); });
        }

        function cancelAndRestart() {
            document.querySelectorAll('.step-container').forEach(el => { el.style.display = 'none'; el.classList.remove('active'); });
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block'; msgDiv.style.color = "#8f9779";
            msgDiv.innerText = "🔄 Повертаємось назад...";

            fetch(`${bookUrl}?action=cancel&bookingId=${currentBookingId}&userId=${userId}`)
                .then(() => {
                    msgDiv.style.display = 'none';
                    if(fpInstance) fpInstance.clear();
                    currentBookingId = null;
                    goBack(1);
                    loadCalendarDates(); 
                });
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomIdFromUrl = urlParams.get('room_id');
            const selectElem = document.getElementById('cottageSelect');
            if (roomIdFromUrl) {
                for(let i=0; i < selectElem.options.length; i++) {
                    if(selectElem.options[i].value === roomIdFromUrl) { selectElem.selectedIndex = i; break; }
                }
            }
            loadCalendarDates(); 
        };
    </script>
</body>
</html>
