<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSO Booking & Доступність</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; background-color: #f9f6f0; overflow-x: hidden; }
        .bosman-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #8f9779; margin-bottom: 10px; object-fit: cover; }
        .step-container { background: white; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 340px; margin: 0 auto; display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; }
        .step-container.active { opacity: 1; transform: translateY(0); }
        h2 { color: #2c3e50; font-size: 22px; margin-top: 5px; margin-bottom: 5px; font-weight: 700; }
        p.subtitle { color: #7f8c8d; font-size: 15px; margin-top: 0; margin-bottom: 20px; }
        
        /* 🔥 ОНОВЛЕНІ СТИЛІ КНОПОК 🔥 */
        button { background-color: #8f9779; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.2s ease; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(143, 151, 121, 0.3); }
        button:active { transform: scale(0.98); }
        
        /* Стиль для другорядної кнопки (контурної) */
        .btn-outline { background-color: transparent; color: #8f9779; border: 2px solid #8f9779; box-shadow: none; }
        
        /* Стиль для кнопок вибору гостей */
        .guest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .guest-btn { background-color: white; color: #8f9779; border: 2px solid #8f9779; padding: 15px 5px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 0; box-shadow: none; }
        .guest-btn:hover { background-color: #8f9779; color: white; }
        
        /* Спеціальний клас для фінальних кнопок, щоб вони були однакові */
        .final-btn { margin-bottom: 15px; }
        .final-btn:last-child { margin-bottom: 0; }

        #message { margin-top: 20px; font-weight: bold; font-size: 16px; display: none; padding: 15px; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .select-css { display: block; font-size: 16px; font-family: inherit; font-weight: 500; color: #2c3e50; line-height: 1.4; padding: 16px 20px; width: 100%; box-sizing: border-box; margin: 0 auto 20px auto; border: 2px solid #e0e0e0; border-radius: 12px; background-color: white; -moz-appearance: none; -webkit-appearance: none; appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238f9779%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat, repeat; background-position: right 1em top 50%, 0 0; background-size: .8em auto, 100%; outline: none; cursor: pointer; transition: all 0.3s ease; }
        .select-css:hover, .select-css:focus { border-color: #8f9779; }
        #loader { color: #8f9779; font-weight: bold; margin-bottom: 20px; }
        
        .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay { visibility: hidden !important; pointer-events: none !important; }
        .flatpickr-day.booked-date { background-color: #e74c3c !important; color: white !important; opacity: 0.8 !important; transform: scale(0.9); border-radius: 50% !important; border: none !important; }
        .flatpickr-day:not(.flatpickr-disabled):not(.prevMonthDay):not(.nextMonthDay):not(.selected):not(.startRange):not(.endRange):not(.inRange) { background-color: #2ecc71 !important; color: white !important; border: none !important; transform: scale(0.9); border-radius: 50% !important; }
        .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange { background-color: #8f9779 !important; color: white !important; border: none !important; border-radius: 50% !important; transform: scale(0.9) !important; box-shadow: none !important; }
        .flatpickr-day.inRange { background-color: #dce0d1 !important; color: #2c3e50 !important; border: none !important; border-radius: 50% !important; transform: scale(0.9) !important; box-shadow: none !important; }

        /* Стиль для фінального чеку - зробив його більш "паперовим" */
        #summary-content { text-align: left; background: #fffdf9; padding: 20px; border-radius: 12px; font-size: 15px; line-height: 1.7; border: 2px dashed #dce0d1; margin-bottom: 25px; box-shadow: inset 0 0 20px rgba(143, 151, 121, 0.05); }
        #summary-content b { color: #2c3e50; font-weight: 700; }
        .summary-disclaimer { font-size: 13px; color: #7f8c8d; border-top: 1px solid #e0e0e0; padding-top: 15px; margin-top: 15px; }
    </style>
</head>
<body>

    <img id="main-img" src="bosman.jpg" alt="Капітан Босман" class="bosman-avatar" onerror="this.src='https://via.placeholder.com/100?text=BOSO'">
    <h2 id="main-title">Бронювання котеджу ⚓</h2>
    <p id="main-subtitle" class="subtitle">🔴 Зайнято | 🟢 Вільно</p>

    <div id="step-1" class="step-container active" style="display: block;">
        <select id="cottageSelect" class="select-css" onchange="loadCalendarDates()">
            <option value="65e8865b5cc7538d464e3f77">JUNIOR 1 (котедж для двох)</option>
            <option value="65e8834e5cc7538d464e3b46">FAMILY №2 (сімейний котедж)</option>
            <option value="65e8863a5cc7538d464e3eab">FAMILY №3 (сімейний котедж)</option>
            <option value="65e886505cc7538d464e3f1d">FAMILY №4 (сімейний котедж)</option>
        </select>
        <div id="loader">⏳ Звіряємо бортові журнали...</div>
        <div id="calendar-wrapper" style="display: none;">
            <input type="text" id="inlineCalendar" style="display:none;">
            <button id="nextBtnStep1" style="display:none; margin-top: 20px;" onclick="goToStep2()">Продовжити бронювання</button>
        </div>
    </div>

    <div id="step-2" class="step-container">
        <div id="guest-buttons" class="guest-grid"></div>
        <button class="btn-outline" onclick="goBack(1)" style="padding: 12px; font-size: 15px; margin-top: 10px;">Назад</button>
    </div>

    <div id="step-3" class="step-container">
        <button onclick="goToStep4('Так')">🐶 Так, ми з хвостиком</button>
        <button class="btn-outline" onclick="goToStep4('Ні')">Ні, без тварин</button>
        <button class="btn-outline" onclick="goBack(2)" style="border: none; margin-top: 15px; padding: 12px;">Назад</button>
    </div>

    <div id="step-4" class="step-container">
        <button onclick="submitData('Так')">♨️ Так, обов'язково!</button>
        <button class="btn-outline" onclick="submitData('Ні')">Ні, дякую</button>
        <button class="btn-outline" onclick="goBack(3)" style="border: none; margin-top: 15px; padding: 12px;">Назад</button>
    </div>

    <div id="step-5" class="step-container">
        <h3 style="color: #2c3e50; margin-top: 0; font-size: 20px; margin-bottom: 20px;">Капітан підготував чек 📜</h3>
        <div id="summary-content"></div>
        <button class="final-btn" onclick="confirmBooking()">✅ Підтвердити та забронювати</button>
        <button class="btn-outline final-btn" onclick="cancelAndRestart()">🔄 Почати спочатку</button>
    </div>

    <div id="message">⚓ Перевіряємо та бронюємо...</div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/uk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const urlParams = new URLSearchParams(window.location.search);
        const userId = tg.initDataUnsafe?.user?.id || urlParams.get('user_id');
        const guestName = urlParams.get('guest_name') || tg.initDataUnsafe?.user?.first_name || "Гість";
        const guestPhone = urlParams.get('guest_phone')?.replace(' ', '+') || "Не вказано";

        const checkDatesUrl = "https://script.google.com/macros/s/AKfycbzsTNRpYZ38kHrurbQ9q289W7PJdrPDr614Zjc07FiyMy663CJowAl_Rtnsftwb_jQQ/exec";
        
        // ⚠️ ВАЖЛИВО: Заміни це посилання на своє АКТУАЛЬНЕ посилання на скрипт бронювання!
        const bookUrl = "https://script.google.com/macros/s/AKfycbwQNcWFZPXQHNY4VRUUujMIqJsHXA5O-vNmvKICxwQfiJfQH71AZlHQUU74OSFfwEOxrw/exec";

        let fpInstance = null; 
        let finalCheckIn = "", finalCheckOut = "", finalGuests = "", finalPets = "", finalRoomId = "";
        let currentBookingId = null;

        function updateHeader(title, subtitle) {
            document.getElementById('main-title').innerText = title;
            document.getElementById('main-subtitle').innerText = subtitle;
        }

        function showStep(stepNumber) {
            document.querySelectorAll('.step-container').forEach(el => { el.style.display = 'none'; el.classList.remove('active'); });
            setTimeout(() => { 
                let current = document.getElementById('step-' + stepNumber);
                current.style.display = 'block'; 
                setTimeout(() => current.classList.add('active'), 10);
            }, 10);
        }

        function loadCalendarDates() {
            finalRoomId = document.getElementById('cottageSelect').value;
            document.getElementById('loader').style.display = 'block';
            document.getElementById('calendar-wrapper').style.display = 'none';
            document.getElementById('nextBtnStep1').style.display = 'none';

            fetch(`${checkDatesUrl}?roomId=${finalRoomId}`)
                .then(response => response.json())
                .then(disabledDatesArray => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('calendar-wrapper').style.display = 'block';

                    const bookedDatesSet = new Set(disabledDatesArray);
                    if (fpInstance) fpInstance.destroy();

                    fpInstance = flatpickr("#inlineCalendar", {
                        inline: true, mode: "range", minDate: "today", locale: "uk", showMonths: 1, disable: disabledDatesArray,
                        onDayCreate: function(dObj, dStr, fp, dayElem) {
                            if (bookedDatesSet.has(fp.formatDate(dayElem.dateObj, "Y-m-d"))) dayElem.classList.add("booked-date");
                        },
                        onChange: function(selectedDates, dateStr, instance) {
                            if (selectedDates.length === 2) {
                                finalCheckIn = instance.formatDate(selectedDates[0], "Y-m-d");
                                finalCheckOut = instance.formatDate(selectedDates[1], "Y-m-d");
                                document.getElementById('nextBtnStep1').style.display = 'block';
                            } else {
                                document.getElementById('nextBtnStep1').style.display = 'none';
                            }
                        }
                    });
                }).catch(e => document.getElementById('loader').innerText = "❌ Помилка зв'язку. Спробуйте пізніше.");
        }

        function goToStep2() {
            const maxGuests = (finalRoomId === "65e8865b5cc7538d464e3f77") ? 4 : 6; 
            const guestDiv = document.getElementById("guest-buttons");
            guestDiv.innerHTML = ""; guestDiv.style.gridTemplateColumns = (maxGuests === 4) ? "repeat(2, 1fr)" : "repeat(3, 1fr)";
            for(let i = 1; i <= maxGuests; i++) {
                let btn = document.createElement("button"); btn.className = "guest-btn"; btn.innerText = i + " 👤";
                btn.onclick = function() { finalGuests = i; goToStep3(); }; guestDiv.appendChild(btn);
            }
            updateHeader("Скільки вас буде?", "Оберіть кількість осіб"); showStep(2);
        }

        function goToStep3() { updateHeader("Ви з пухнастиком?", "Ми дружні до тварин"); showStep(3); }

        function goToStep4(petAnswer) {
            finalPets = petAnswer;
            if (finalRoomId === "65e8863a5cc7538d464e3eab" || finalRoomId === "65e886505cc7538d464e3f1d") {
                updateHeader("Бажаєте гарячий чан?", "Ідеально для вечірнього релаксу"); showStep(4);
            } else { submitData("На місці (по ситуації)"); }
        }

        function goBack(stepNumber) {
            if(stepNumber === 1) { updateHeader("Бронювання котеджу ⚓", "🔴 Зайнято | 🟢 Вільно"); document.getElementById('nextBtnStep1').style.display = 'none'; }
            if(stepNumber === 2) updateHeader("Скільки вас буде?", "Оберіть кількість осіб");
            if(stepNumber === 3) updateHeader("Ви з пухнастиком?", "Ми дружні до тварин");
            showStep(stepNumber);
        }

        function submitData(chanAnswer) {
            document.querySelectorAll('.step-container').forEach(el => { el.style.display = 'none'; el.classList.remove('active'); });

            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block'; msgDiv.style.color = "#8f9779";
            // 🔥 Оновлений текст лоадера 🔥
            msgDiv.innerText = "⚓ Отримуємо точний розрахунок від Капітана..."; 
            updateHeader("Оформлюємо чек", "Зачекайте кілька секунд...");

            const finalUrl = `${bookUrl}?action=book&userId=${userId}&checkIn=${finalCheckIn}&checkOut=${finalCheckOut}&guests=${finalGuests}&pets=${finalPets}&chan=${chanAnswer}&roomId=${finalRoomId}&guestName=${encodeURIComponent(guestName)}&guestPhone=${encodeURIComponent(guestPhone)}`;

            fetch(finalUrl).then(response => response.json()).then(data => {
                msgDiv.style.display = 'none';
                if (data.error && data.error.includes("Зайнято")) {
                    msgDiv.style.display = 'block'; msgDiv.style.color = "#e74c3c"; msgDiv.innerText = "⚠️ Дати вже зайняті екіпажем! Оберіть інші.";
                    setTimeout(() => { msgDiv.style.display = 'none'; if(fpInstance) fpInstance.clear(); goBack(1); }, 3500);
                } else if (data.error) {
                    msgDiv.style.display = 'block'; msgDiv.style.color = "#e74c3c"; msgDiv.innerText = "❌ Шторм на лінії! Повертаємо в чат.";
                    setTimeout(() => { if (tg) tg.close(); }, 2500);
                } else {
                    currentBookingId = data.bookingId;
                    let extraHtml = data.extraFeeText ? data.extraFeeText.replace(/\n/g, "<br>") + "<br>" : "";

                    document.getElementById('summary-content').innerHTML = `
                        <b>🏠 Ваш вибір:</b> ${data.roomName}<br>
                        <b>📅 Дати:</b> ${data.checkIn} — ${data.checkOut} (${data.nights} ночі)<br>
                        <b>👥 Екіпаж:</b> ${data.guests} осіб | <b>🐶 Хвостик:</b> ${data.pets} | <b>♨️ Чан:</b> ${data.chan}<br><br>
                        ${extraHtml}
                        <b>💵 Вартість:</b> <s>${data.basePrice} грн</s><br>
                        <b>🎁 Знижка від Капітана:</b> -${data.discount} грн<br>
                        <b>✅ Разом до сплати:</b> ${data.totalPrice} грн<br><br>
                        <b>💳 Передоплата (50%):</b> ${data.prepayment} грн<br>
                        <div class="summary-disclaimer">
                            🎖️ <b>Пільга УБД:</b> Знижку -10% можна отримати при заїзді.<br>
                            ⏳ <b>Важливо:</b> Дати зарезервовані за вами. Будь ласка, підтвердіть та здійсніть оплату в чаті протягом 30 хвилин.
                        </div>
                    `;
                    updateHeader("Бортовий журнал 📋", "Перевірте деталі перед оплатою");
                    showStep(5);
                }
            }).catch(e => {
                msgDiv.style.display = 'block'; msgDiv.style.color = "#e74c3c"; msgDiv.innerText = "❌ Помилка підключення.";
                setTimeout(() => { if (tg) tg.close(); }, 2500);
            });
        }

        function confirmBooking() {
            document.querySelectorAll('.step-container').forEach(el => { el.style.display = 'none'; el.classList.remove('active'); });
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block'; msgDiv.style.color = "#4CAF50";
            msgDiv.innerText = "✅ Дати успішно зафіксовано! Повертайтеся в чат для оплати.";

            fetch(`${bookUrl}?action=confirm&userId=${userId}`)
                .then(() => { setTimeout(() => { if (tg) tg.close(); }, 2000); })
                .catch(() => { setTimeout(() => { if (tg) tg.close(); }, 2000); });
        }

        function cancelAndRestart() {
            document.querySelectorAll('.step-container').forEach(el => { el.style.display = 'none'; el.classList.remove('active'); });
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block'; msgDiv.style.color = "#8f9779";
            msgDiv.innerText = "🔄 Скасовуємо бронь та повертаємо на старт...";

            fetch(`${bookUrl}?action=cancel&bookingId=${currentBookingId}`)
                .then(() => {
                    msgDiv.style.display = 'none';
                    if(fpInstance) fpInstance.clear();
                    currentBookingId = null;
                    goBack(1);
                    loadCalendarDates(); 
                });
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomIdFromUrl = urlParams.get('room_id');
            const selectElem = document.getElementById('cottageSelect');
            if (roomIdFromUrl) {
                for(let i=0; i < selectElem.options.length; i++) {
                    if(selectElem.options[i].value === roomIdFromUrl) { selectElem.selectedIndex = i; break; }
                }
            }
            loadCalendarDates(); 
        };
    </script>
</body>
</html>
